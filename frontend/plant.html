<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plant Book — Tanbao Corp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root{--green-dark:#1a4731;--green:#2d7a4f;--green-light:#e8f5ee;--amber:#f59e0b;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-400:#9ca3af;--gray-600:#4b5563;--gray-800:#1f2937}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:#f0f7f2;color:var(--gray-800);min-height:100vh}

  .hero{background:linear-gradient(150deg,#0f2b1b,#1a4731,#2d7a4f);color:#fff;padding:0}
  .hero-inner{max-width:900px;margin:0 auto;padding:40px 24px 0}
  .brand-bar{display:flex;align-items:center;gap:10px;margin-bottom:32px;opacity:.7}
  .brand-bar span{font-size:13px}
  .cover-wrap{position:relative;width:100%;max-height:420px;overflow:hidden;border-radius:16px 16px 0 0;background:rgba(255,255,255,.05)}
  .cover-wrap img{width:100%;max-height:420px;object-fit:cover;display:block;border-radius:16px 16px 0 0}
  .no-cover{display:flex;align-items:center;justify-content:center;height:200px;font-size:80px}

  .main-content{max-width:900px;margin:0 auto;padding:0 24px 40px}
  .plant-card{background:#fff;border-radius:0 0 16px 16px;padding:32px;box-shadow:0 4px 20px rgba(0,0,0,.08);margin-bottom:24px}
  .plant-header{display:flex;align-items:flex-start;gap:20px;margin-bottom:24px}
  .plant-type-icon{width:56px;height:56px;background:var(--green-light);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
  .plant-title{font-size:26px;font-weight:700;line-height:1.2}
  .plant-variety{font-size:15px;color:var(--gray-400);margin-top:4px}
  .badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:100px;font-size:12px;font-weight:600}
  .badge-green{background:#dcfce7;color:#16a34a}
  .badge-amber{background:#fef3c7;color:#d97706}
  .badge-red{background:#fef2f2;color:#dc2626}
  .badge-blue{background:#eff6ff;color:#2563eb}
  .badge-gray{background:#f3f4f6;color:#6b7280}

  .info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1px;background:var(--gray-100);border-radius:10px;overflow:hidden;margin-bottom:24px}
  .info-cell{background:#fff;padding:16px 20px}
  .info-cell .label{font-size:11px;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
  .info-cell .val{font-size:14px;font-weight:500}

  /* Extra fields */
  .extra-section{background:#fff;border-radius:14px;padding:24px;margin-bottom:24px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .section-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
  .extra-fields-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
  .extra-field{background:var(--gray-100);border-radius:8px;padding:12px 16px}
  .extra-field .ef-label{font-size:11px;color:var(--gray-400);font-weight:600;text-transform:uppercase;margin-bottom:4px}
  .extra-field .ef-val{font-size:14px;font-weight:500}

  /* Media */
  .media-section{background:#fff;border-radius:14px;padding:24px;margin-bottom:24px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
  .media-thumb{border-radius:8px;overflow:hidden;aspect-ratio:1;background:var(--gray-100);cursor:pointer}
  .media-thumb img,.media-thumb video{width:100%;height:100%;object-fit:cover}

  /* Logs */
  .logs-section{background:#fff;border-radius:14px;padding:24px;margin-bottom:24px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .log-item{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--gray-100)}
  .log-item:last-child{border-bottom:none}
  .log-date-badge{background:var(--green-light);color:var(--green);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:600;white-space:nowrap;height:fit-content}
  .log-type{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;background:#eff6ff;color:#2563eb;font-weight:600;margin-bottom:4px}
  .log-note{font-size:13px;color:var(--gray-600);line-height:1.6}

  /* Lightbox */
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:999;display:none;align-items:center;justify-content:center}
  .lightbox.open{display:flex}
  .lightbox img,.lightbox video{max-width:90vw;max-height:90vh;border-radius:8px}
  .lightbox-close{position:fixed;top:20px;right:20px;background:rgba(255,255,255,.2);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer}

  .footer{text-align:center;padding:24px;font-size:12px;color:var(--gray-400)}
  .footer a{color:var(--green);text-decoration:none}

  .error-state{text-align:center;padding:80px 24px}
  .error-state .icon{font-size:56px;margin-bottom:16px}
  .error-state h2{font-size:20px;margin-bottom:8px}
  .error-state p{color:var(--gray-400)}

  .skeleton{background:linear-gradient(90deg,#e5e7eb 25%,#f3f4f6 50%,#e5e7eb 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

  .share-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;background:var(--green-light);color:var(--green);border:none;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
  .share-btn:hover{background:#c7f0d8}
</style>
</head>
<body>

<div id="root">
  <!-- Skeleton loader -->
  <div id="loader">
    <div class="hero"><div class="hero-inner"><div class="no-cover">🌿</div></div></div>
    <div class="main-content"><div class="plant-card">
      <div class="skeleton" style="height:32px;width:60%;margin-bottom:12px"></div>
      <div class="skeleton" style="height:18px;width:40%;margin-bottom:24px"></div>
      <div class="skeleton" style="height:100px"></div>
    </div></div>
  </div>
  <div id="error-view" style="display:none">
    <div class="error-state">
      <div class="icon">🍂</div>
      <h2 id="error-title">Không tìm thấy</h2>
      <p id="error-msg">Trang cây này không tồn tại hoặc chưa được công khai.</p>
    </div>
  </div>
  <div id="plant-view" style="display:none"></div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <div id="lightbox-content"></div>
</div>

<script>
const slug = location.pathname.replace('/plant/','').split('/')[0];

function healthBadge(h) {
  const map = {'Tốt':'badge-green','Bình thường':'badge-blue','Cần chú ý':'badge-amber','Bệnh':'badge-red'};
  return `<span class="badge ${map[h]||'badge-gray'}"><i class="fa fa-circle-dot"></i> ${h}</span>`;
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'});
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openLightbox(url, type) {
  document.getElementById('lightbox-content').innerHTML = type === 'video'
    ? `<video src="${esc(url)}" controls autoplay style="max-width:90vw;max-height:90vh;border-radius:8px"></video>`
    : `<img src="${esc(url)}" style="max-width:90vw;max-height:90vh;border-radius:8px">`;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-content').innerHTML = '';
}

async function loadPlant() {
  try {
    const res = await fetch(`/api/plants/public/${encodeURIComponent(slug)}`);
    const plant = await res.json();
    if (!res.ok) throw new Error(plant.error || 'Không tìm thấy');

    document.title = `${plant.plant_type} — Plant Book | Tanbao Corp`;
    renderPlant(plant);
  } catch (err) {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('error-view').style.display = 'block';
    document.getElementById('error-msg').textContent = err.message;
  }
}

function renderPlant(plant) {
  const extra = plant.data || {};
  const schemaFields = plant.schema_fields || [];
  const media = plant.media || [];
  const logs = plant.logs || [];

  let html = `
    <div class="hero">
      <div class="hero-inner">
        <div class="brand-bar">
          <span>🌿</span>
          <span>Plant Book — Tanbao Corp</span>
        </div>
        <div class="cover-wrap">
          ${plant.cover_image
            ? `<img src="${esc(plant.cover_image)}" alt="${esc(plant.plant_type)}">`
            : `<div class="no-cover">🌱</div>`}
        </div>
      </div>
    </div>

    <div class="main-content">
      <div class="plant-card">
        <div class="plant-header">
          <div class="plant-type-icon">🌱</div>
          <div>
            <div class="plant-title">${esc(plant.plant_type)}</div>
            ${plant.plant_variety ? `<div class="plant-variety">Giống: ${esc(plant.plant_variety)}</div>` : ''}
            <div class="badges">
              ${healthBadge(plant.health_status)}
              ${plant.plant_age ? `<span class="badge badge-blue"><i class="fa fa-calendar"></i> ${esc(plant.plant_age)}</span>` : ''}
              ${plant.schema_name ? `<span class="badge badge-gray"><i class="fa fa-layer-group"></i> ${esc(plant.schema_name)}</span>` : ''}
            </div>
          </div>
          <div style="margin-left:auto">
            <button class="share-btn" onclick="share()"><i class="fa fa-share-nodes"></i> Chia sẻ</button>
          </div>
        </div>

        <div class="info-grid">
          ${plant.location ? `<div class="info-cell"><div class="label">📍 Vị trí</div><div class="val">${esc(plant.location)}</div></div>` : ''}
          <div class="info-cell"><div class="label">📅 Ngày tạo hồ sơ</div><div class="val">${fmtDate(plant.created_at)}</div></div>
          <div class="info-cell"><div class="label">🖼️ Ảnh/Video</div><div class="val">${media.length} tệp</div></div>
          <div class="info-cell"><div class="label">📋 Nhật ký</div><div class="val">${logs.length} mục</div></div>
        </div>
      </div>
  `;

  // Extra schema fields
  const extraEntries = schemaFields.filter(f => extra[f.name]);
  if (extraEntries.length) {
    html += `
      <div class="extra-section">
        <div class="section-title">📊 Thông tin chi tiết</div>
        <div class="extra-fields-grid">
          ${extraEntries.map(f => `
            <div class="extra-field">
              <div class="ef-label">${esc(f.name)}</div>
              <div class="ef-val">${esc(extra[f.name])}</div>
            </div>`).join('')}
        </div>
      </div>`;
  }

  // Media gallery
  if (media.length) {
    html += `
      <div class="media-section">
        <div class="section-title">🖼️ Thư viện ảnh & video</div>
        <div class="media-grid">
          ${media.map(m => `
            <div class="media-thumb" onclick="openLightbox('${esc(m.url)}','${esc(m.media_type)}')">
              ${m.media_type === 'video'
                ? `<video src="${esc(m.url)}" muted></video>`
                : `<img src="${esc(m.url)}" alt="${esc(m.caption||'')}">` }
            </div>`).join('')}
        </div>
      </div>`;
  }

  // Logs
  if (logs.length) {
    html += `
      <div class="logs-section">
        <div class="section-title">📋 Nhật ký chăm sóc</div>
        ${logs.map(l => `
          <div class="log-item">
            <div class="log-date-badge">${fmtDate(l.log_date)}</div>
            <div>
              <div class="log-type">${esc(l.log_type||'Ghi chú')}</div>
              <div class="log-note">${esc(l.note||'')}</div>
            </div>
          </div>`).join('')}
      </div>`;
  }

  html += `
    <div class="footer">
      Hồ sơ cây trồng số hóa bởi <a href="/">Plant Book</a> — Tanbao Corp &nbsp;|&nbsp;
      Cập nhật lần cuối: ${fmtDate(plant.updated_at)}
    </div>
  </div>`;

  document.getElementById('loader').style.display = 'none';
  const view = document.getElementById('plant-view');
  view.innerHTML = html;
  view.style.display = 'block';
}

function share() {
  if (navigator.share) {
    navigator.share({ title: document.title, url: location.href });
  } else {
    navigator.clipboard.writeText(location.href);
    alert('Đã copy đường dẫn!');
  }
}

loadPlant();
</script>
</body>
</html>
