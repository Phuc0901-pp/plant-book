<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mapbox GIS Vệ Tinh</title>
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
  <style>
    body { margin: 0; padding: 0; background: #f8fafc; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; height: 100%; }
    
    .target-marker {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background-color: #22C55E;
      border: 2px solid white;
      box-shadow: 0 0 0 5px rgba(34, 197, 94, 0.35);
      animation: pulse 1.6s infinite alternate;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 11px;
      font-weight: bold;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }
    .target-marker.sick {
      background-color: #EF4444;
      box-shadow: 0 0 0 5px rgba(239, 68, 68, 0.35);
    }
    .target-marker.warn {
      background-color: #F59E0B;
      box-shadow: 0 0 0 5px rgba(245, 158, 11, 0.35);
    }
    
    @keyframes pulse {
      0% { transform: scale(0.92); box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.3); }
      100% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
    }
    .mapboxgl-ctrl-logo, .mapboxgl-ctrl-attrib {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    // Extract slug from URL /plant/:slug/map
    const pathSegments = window.location.pathname.split('/');
    const slugIndex = pathSegments.indexOf('plant') + 1;
    const slug = pathSegments[slugIndex];

    async function initMap() {
      try {
        // Fetch mapbox token
        const tokenRes = await fetch('/api/config/mapbox-token');
        const tokenData = await tokenRes.json();
        const mapboxToken = tokenData.token;
        if (!mapboxToken) throw new Error("Mapbox token not loaded");
        
        mapboxgl.accessToken = mapboxToken;

        // Fetch plant details
        const plantRes = await fetch('/api/plants/public/' + slug);
        if (!plantRes.ok) throw new Error("Failed to load plant info");
        const plantData = await plantRes.json();

        const lat = parseFloat(plantData.latitude);
        const lng = parseFloat(plantData.longitude);
        const health = plantData.health_status || 'Tốt';
        const treeCode = plantData.tree_code || plantData.id.toString();

        const map = new mapboxgl.Map({
          container: 'map',
          style: 'mapbox://styles/mapbox/satellite-streets-v12', // Satellite streets
          center: (lng && lat) ? [lng, lat] : [108.2, 12.0],
          zoom: 17.5,
          attributionControl: false
        });

        map.addControl(new mapboxgl.NavigationControl({ showCompass: true }), 'top-right');

        // Location tracker
        const geolocate = new mapboxgl.GeolocateControl({
          positionOptions: {
            enableHighAccuracy: true
          },
          trackUserLocation: true,
          showUserHeading: true
        });
        map.addControl(geolocate, 'top-right');

        map.on('load', () => {
          setTimeout(() => {
            try { geolocate.trigger(); } catch (e) {}
          }, 800);

          // Draw farm polygon coordinates
          let poly = [];
          if (plantData.farm_polygon) {
            try {
              const parsed = typeof plantData.farm_polygon === 'string'
                ? JSON.parse(plantData.farm_polygon)
                : plantData.farm_polygon;
              
              if (parsed && parsed.length > 0) {
                if (Array.isArray(parsed[0]) && Array.isArray(parsed[0][0])) {
                  poly = [...parsed[0]];
                } else {
                  poly = [...parsed];
                }
              }
            } catch (e) {
              console.error("Error parsing farm polygon:", e);
            }
          }

          if (poly.length > 0) {
            if (poly[0][0] !== poly[poly.length - 1][0] || poly[0][1] !== poly[poly.length - 1][1]) {
              poly.push(poly[0]);
            }

            map.addSource('farm-boundary', {
              'type': 'geojson',
              'data': {
                'type': 'Feature',
                'geometry': {
                  'type': 'Polygon',
                  'coordinates': [poly]
                }
              }
            });

            map.addLayer({
              'id': 'farm-fill',
              'type': 'fill',
              'source': 'farm-boundary',
              'layout': {},
              'paint': {
                'fill-color': '#22C55E',
                'fill-opacity': 0.12
              }
            });

            map.addLayer({
              'id': 'farm-outline',
              'type': 'line',
              'source': 'farm-boundary',
              'layout': {},
              'paint': {
                'line-color': '#22C55E',
                'line-width': 2.5
              }
            });
          }

          // Add plant marker
          if (lng && lat) {
            const el = document.createElement('div');
            el.className = 'target-marker';
            if (health === 'Bệnh') el.className += ' sick';
            if (health === 'Cần chú ý') el.className += ' warn';
            el.innerText = treeCode;

            new mapboxgl.Marker({ element: el })
              .setLngLat([lng, lat])
              .addTo(map);
          }
        });
      } catch (err) {
        console.error(err);
      }
    }

    initMap();
  </script>
</body>
</html>
