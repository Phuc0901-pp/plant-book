name: Keep Render App Awake

on:
  schedule:
    # Chạy mỗi 10 phút (Render Free tier tự động ngủ sau 15 phút không hoạt động)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Cho phép chạy thủ công từ giao diện GitHub Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send ping request to Render
        run: |
          # URL của dự án Render (thay đổi nếu URL của bạn có hậu tố khác)
          URL="https://plant-book.onrender.com/api/health"
          
          echo "Pinging $URL..."
          response=$(curl -s -w "%{http_code}" -o /dev/null "$URL")
          if [ "$response" -eq 200 ]; then
            echo "[SUCCESS] Ping thành công! Dịch vụ đang hoạt động."
          else
            echo "[WARMING] Cảnh báo: Phản hồi từ máy chủ nhận được mã $response. Vui lòng kiểm tra lại URL: $URL"
          fi
